<!DOCTYPE html>

<html>
  <head>
    <meta charset="UTF-8" />
    <title>React App</title>
  </head>

  <body>
    <div id="root"></div>

<!-- React CDN -->
<script>
  document.write('<script src="https://unpkg.com/react@18/umd/react.development.js"><\\/script>');
  document.write('<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"><\\/script>');
</script>

<script>
  setTimeout(() => {
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(
      React.createElement("h1", null, "Hello World 👋 Welcome")
    );
  }, 500);
</script>

  </body>
</html>
